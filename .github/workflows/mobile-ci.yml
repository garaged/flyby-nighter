name: Mobile CI

on:
  pull_request:

jobs:
  ios-build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build iPhone and iPad target
        run: |
          if ! xcodebuild \
            -project Apps/FlybyNighterMobile/FlybyNighterMobile.xcodeproj \
            -scheme FlybyNighterMobile \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build > mobile-build.log 2>&1; then
            tail -120 mobile-build.log
            exit 1
          fi
      - name: Upload mobile build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-build-log
          path: mobile-build.log
