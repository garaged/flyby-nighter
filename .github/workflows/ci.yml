name: CI

on:
  pull_request:

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: swift --version
      - name: Build package
        run: |
          if ! swift build > swift-build.log 2>&1; then
            tail -80 swift-build.log
            exit 1
          fi
      - run: swift test
